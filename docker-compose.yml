version: '3.8'\n\nservices:\n  trading-bot:\n    image: trading-bot-image\n    environment:\n      - ENV_VAR1=value1\n      - ENV_VAR2=value2\n      - ENV_VAR3=value3\n    volumes:\n      - ./logs:/app/logs\n    healthcheck:\n      test: [ 'CMD', 'curl', '-f', 'http://localhost:YOUR_PORT/health' ]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n\n  nginx:\n    image: nginx:latest\n    ports:\n      - "80:80"\n    volumes:\n      - ./nginx.conf:/etc/nginx/nginx.conf\n    depends_on:\n      - trading-bot\n